<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You — Ashborne Partners</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --obsidian:   #F8F6F2;
      --gold:       #8FA68E;
      --parchment:  #1F365C;
      --ash:        #6E6A66;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--obsidian);
      color: var(--parchment);
      font-family: 'Cormorant Garamond', Georgia, serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .wrap { max-width: 600px; }
    h1 {
      font-family: 'Cinzel', serif;
      font-size: 2.6rem;
      color: var(--gold);
      margin-bottom: 1.5rem;
      font-weight: 600;
    }
    p {
      font-size: 1.25rem;
      line-height: 1.7;
      color: var(--parchment);
      margin-bottom: 2.5rem;
    }
    a {
      font-family: 'Cinzel', serif;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.85rem;
      color: var(--gold);
      text-decoration: none;
      border: 1px solid var(--gold);
      padding: 0.9rem 2.2rem;
      transition: all 0.25s ease;
      display: inline-block;
    }
    a:hover { background: var(--gold); color: var(--obsidian); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Thank You</h1>
    <p>Your enquiry has been received. A partner will be in touch within 24 hours.</p>
    <a href="/">Return to Home</a>
  </div>
</body>
</html>
